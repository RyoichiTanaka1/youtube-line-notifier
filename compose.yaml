services:
  notifier:
    build:
      context: .
    container_name: youtube-line-notifier
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8000"
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
